<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#b829ff">
    <meta name="description" content="Anime Deutsche Synchro Tracker v11.1 - Premium">
    <title>Anime Synchro Tracker Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Premium Color Palette */
            --bg-base: #030014;
            --bg-accent: #0f0a29;
            --primary: #b829ff;
            --primary-glow: rgba(184, 41, 255, 0.4);
            --primary-light: #d880ff;
            --secondary: #00d2ff;
            --secondary-glow: rgba(0, 210, 255, 0.4);
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-bg-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-border-highlight: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            /* Typography */
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            /* Status Colors */
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(184, 41, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 210, 255, 0.08), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated Background Elements */
        .bg-flare {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite ease-in-out;
            opacity: 0.5;
        }

        .flare-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: rgba(184, 41, 255, 0.15); animation-delay: 0s; }
        .flare-2 { bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: rgba(0, 210, 255, 0.1); animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, 5%) scale(1.05); }
            66% { transform: translate(-5%, 5%) scale(0.95); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Glass Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(3, 0, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primaryLight), var(--secondary));
            background: linear-gradient(to right, #b829ff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        /* Premium Buttons */
        .btn {
            font-family: var(--font-display);
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8133ff);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-glass {
            background: var(--glass-bg);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-glass:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-highlight);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .main {
            padding: 40px 0 80px;
        }

        /* Filtering & Stats Box */
        .dashboard-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: var(--glass-shadow);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s, border-color 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--glass-border-highlight);
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .stat-value.glow-primary {
            background: linear-gradient(135deg, #e8b0ff, var(--primary));
            -webkit-background-clip: text;
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        .stat-value.glow-secondary {
            background: linear-gradient(135deg, #b0f0ff, var(--secondary));
            -webkit-background-clip: text;
            filter: drop-shadow(0 0 8px var(--secondary-glow));
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding-top: 24px;
            border-top: 1px solid var(--glass-border);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #64748b;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(0, 0, 0, 0.5);
        }
        
        select option {
            background: var(--bg-accent);
            color: white;
            padding: 10px;
        }

        /* Modern Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            font-family: var(--font-display);
            padding: 12px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border-highlight);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* Anime Grid & Card Redesign */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .anime-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .anime-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(3, 0, 20, 0.8) 100%);
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .anime-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--glass-border-highlight);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px var(--primary-glow);
        }

        .anime-card:hover::before {
            opacity: 1;
        }

        .anime-image {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            position: relative;
            overflow: hidden;
        }

        /* Abstract pattern for anime placeholder images */
        .anime-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%);
            z-index: 0;
        }

        /* Status Tags */
        .floating-tags {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            z-index: 3;
        }

        .tag-status {
            font-family: var(--font-display);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .tag-aktuell {
            background: rgba(16, 185, 129, 0.8);
            color: #fff;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .tag-kommend {
            background: rgba(245, 158, 11, 0.8);
            color: #fff;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }

        .episodes-badge {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .anime-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            position: relative;
            z-index: 2;
            background: linear-gradient(to top, rgba(3,0,20,1) 30%, transparent);
            margin-top: -60px; /* Overlap image slightly */
        }

        .anime-title {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .anime-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .anime-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Time Highlight Banner */
        .time-highlight {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-highlight.recent {
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05));
            border-left: 3px solid var(--success);
            color: #34d399;
        }

        .time-highlight.soon {
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
            border-left: 3px solid var(--warning);
            color: #fbbf24;
        }

        .anime-actions {
            display: flex;
            gap: 8px;
        }

        .anime-actions button {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .anime-actions button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .anime-actions button.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Loading Spinner */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            gap: 16px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: conic-gradient(from 0deg at 50% 50%, transparent 0%, var(--primary) 100%);
            animation: spin 1s linear infinite;
            position: relative;
        }

        .spinner::before {
            content: '';
            position: absolute;
            inset: 4px;
            background: var(--bg-base);
            border-radius: 50%;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Modal Redesign */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--bg-accent);
            border: 1px solid var(--glass-border-highlight);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.95) translateY(20px);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px var(--primary-glow);
        }

        .modal.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        /* Notifications */
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(16, 185, 129, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-family: var(--font-body);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            transform: translateY(100px);
            opacity: 0;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 50px;
        }

        .pagination button {
            padding: 10px 16px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .pagination button:hover, .pagination button.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* Server Log */
        .update-log {
            background: rgba(15, 10, 41, 0.6);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 24px;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            color: #a1a1aa;
        }

        .update-log::-webkit-scrollbar {
            width: 6px;
        }
        .update-log::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .log-time {
            color: var(--secondary);
            margin-right: 8px;
        }

        .api-status {
            font-family: var(--font-body);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .api-status.online  { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .api-status.cached  { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .api-status.offline { background: rgba(239, 68, 68, 0.15);  color: #f87171; }
        .api-status.loading { background: rgba(59, 130, 246, 0.15); color: #93c5fd; }

        /* Offline Info Banner */
        .offline-banner {
            display: none;
            background: linear-gradient(90deg, rgba(245,158,11,0.12), rgba(245,158,11,0.05));
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 20px;
            align-items: center;
            gap: 14px;
            font-size: 14px;
        }
        .offline-banner.visible { display: flex; }
        .offline-banner-icon { font-size: 24px; flex-shrink: 0; }
        .offline-banner-text { flex: 1; }
        .offline-banner-text strong { color: #fbbf24; display: block; margin-bottom: 2px; }
        .offline-banner-text span { color: var(--text-muted); }
        .offline-banner-action {
            padding: 8px 16px;
            background: rgba(245,158,11,0.2);
            border: 1px solid rgba(245,158,11,0.4);
            border-radius: 8px;
            color: #fbbf24;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .offline-banner-action:hover { background: rgba(245,158,11,0.3); }

        /* Scraping progress indicator */
        .scraping-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--secondary);
            padding: 8px 14px;
            background: rgba(0,210,255,0.08);
            border: 1px solid rgba(0,210,255,0.2);
            border-radius: 20px;
            margin-left: 12px;
            animation: pulse 2s infinite;
        }
        .scraping-indicator.visible { display: inline-flex; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; align-items: flex-start; }
            .header-right { width: 100%; justify-content: space-between; }
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .anime-image { height: 220px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

<body>
    <!-- Abstract Background -->
    <div class="bg-flare flare-1"></div>
    <div class="bg-flare flare-2"></div>

    <header>
        <div class="container">
            <div class="header-content">
                <h1>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Anime Tracker
                    <span class="api-status loading" id="apiStatus">
                        <span style="display:inline-block;width:8px;height:8px;background:#93c5fd;border-radius:50%"></span>
                        Verbinde...
                    </span>
                    <span class="scraping-indicator" id="scrapingIndicator">
                        ⚙️ Aktualisiere Daten...
                    </span>
                </h1>
                <div class="header-right">
                    <button class="btn btn-glass" id="refreshBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg> 
                        Sync
                    </button>
                    <button class="btn btn-primary" id="watchlistBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                        Watchlist
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="update-log" id="updateLog">
                <div class="log-entry"><span class="log-time">[System]</span> Initialisierung läuft...</div>
            </div>

            <div class="dashboard-panel">
                <div class="stats-grid" id="statsGrid">
                    <!-- Stats injected via JS -->
                </div>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="alle">🌌 Alle Animes</button>
                    <button class="tab-btn" data-tab="kommende-dubs">⏱️ Bald verfügbar</button>
                    <button class="tab-btn" data-tab="aktuelle-dubs">🔥 Kürzlich erschienen</button>
                    <button class="tab-btn" data-tab="abgeschlossene-dubs" id="tabAbgeschlossen" style="display:none">✅ Abgeschlossen</button>
                    <button class="tab-btn" data-tab="watchlist">📌 Meine Watchlist</button>
                </div>

                <div class="filters-grid">
                    <div class="filter-group">
                        <label>Suche</label>
                        <input type="text" id="searchInput" placeholder="Welchen Anime suchst du?">
                    </div>
                    <div class="filter-group">
                        <label>Sortierung</label>
                        <select id="sortSelect">
                            <option value="year_desc">📅 Neueste Releases zuerst</option>
                            <option value="title_asc">A-Z Titel</option>
                            <option value="title_desc">Z-A Titel</option>
                            <option value="year_asc">Älteste zuerst</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Elemente pro Seite</label>
                        <select id="pageSizeSelect">
                            <option value="24">24 Animes</option>
                            <option value="48">48 Animes</option>
                            <option value="96">96 Animes</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Offline Banner -->
            <div class="offline-banner" id="offlineBanner">
                <div class="offline-banner-icon">📡</div>
                <div class="offline-banner-text">
                    <strong>Server nicht verbunden – Demo-Modus aktiv</strong>
                    <span>Starte <code>SERVER STARTEN.bat</code> für Live-Daten von anisearch.de. Der Tracker verbindet sich automatisch.</span>
                </div>
                <a class="offline-banner-action" onclick="manualRefresh()">
                    🔄 Neu verbinden
                </a>
            </div>

            <div id="contentArea">
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="color: var(--text-muted); font-family: var(--font-display);">Lade Anime Datenbank...</p>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <!-- Modal Detail Overlay -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="notification"></div>

    <script>
        // ─── Konfiguration ───────────────────────────────────────────────
        const CONFIG = {
            SERVER_URL:       'http://localhost:5000',
            API_ENDPOINT:     'http://localhost:5000/api/anime-data',
            REFRESH_ENDPOINT: 'http://localhost:5000/api/refresh',
            JSON_CACHE:       'anime_data.json',
            POLL_INTERVAL_MS: 30000,  // 30 Sekunden Auto-Poll
            FETCH_TIMEOUT_MS: 5000,

            // ► GitHub Raw URL für InfinityFree-Hosting
            // Wird täglich von GitHub Actions aktualisiert.
            // Format: https://raw.githubusercontent.com/USERNAME/REPO/main/anime_data.json
            // Setze auf '' um diese Quelle zu deaktivieren.
            GITHUB_RAW_URL: 'https://raw.githubusercontent.com/StrikerLUL/anime-ger-dub-tracker/main/anime_data.json',
        };

        // ─── Globaler State ──────────────────────────────────────────────
        const state = {
            animes: [],
            watchlist: [],
            filteredAnimes: [],
            currentPage: 1,
            pageSize: parseInt(localStorage.getItem('premiumPageSize') || '24'),
            currentTab: 'alle',
            dataSource: 'none',  // 'live' | 'cache' | 'demo'
            lastUpdate: null,
            pollTimer: null,
            hasAbgeschlossen: false,
        };

        // Fallback Data updated for UI labels
        const KOMMENDE_DUBS = [
            { title: 'Anne Shirley', year: 2025, episodes: 24, status: 'Upcoming', dub_weeks: 2 },
            { title: 'Assassination Classroom Movie', year: 2026, episodes: 1, status: 'Film', dub_weeks: 3 },
            { title: 'Banana Fish', year: 2018, episodes: 24, status: 'Completed', dub_weeks: 1 },
            { title: 'Bocchi the Rock!', year: 2022, episodes: 12, status: 'Completed', dub_weeks: 2 },
            { title: 'Demon Slayer - Infinity Castle', year: 2025, episodes: 26, status: 'Upcoming', dub_weeks: 1 },
            { title: 'Solo Leveling S2', year: 2024, episodes: 13, status: 'Upcoming', dub_weeks: 4 },
            { title: 'Spy x Family', year: 2022, episodes: 25, status: 'Ongoing', dub_weeks: 3 },
            { title: 'Wind Breaker', year: 2024, episodes: 12, status: 'Ongoing', dub_weeks: 2 }
        ];

        const AKTUELLE_DUBS = [
            { title: 'Jujutsu Kaisen', year: 2020, episodes: 47, status: 'Ongoing', days_ago: 2 },
            { title: 'My Hero Academia', year: 2016, episodes: 120, status: 'Ongoing', days_ago: 5 },
            { title: 'Frieren: Beyond Journey\'s End', year: 2023, episodes: 28, status: 'Completed', days_ago: 1 },
            { title: 'Cyberpunk: Edgerunners', year: 2022, episodes: 10, status: 'Completed', days_ago: 8 },
            { title: 'Chainsaw Man', year: 2022, episodes: 12, status: 'Completed', days_ago: 14 },
            { title: 'Death Note', year: 2006, episodes: 37, status: 'Completed', days_ago: 20 },
            { title: 'Tokyo Ghoul', year: 2014, episodes: 48, status: 'Completed', days_ago: 4 },
            { title: 'One Punch Man', year: 2015, episodes: 24, status: 'Ongoing', days_ago: 10 }
        ];

        function formatTime() {
            return new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute:'2-digit', second:'2-digit' });
        }

        function addLog(message) {
            const logEl = document.getElementById('updateLog');
            if (!logEl) return;
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${formatTime()}]</span> ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
            if (logEl.children.length > 30) logEl.removeChild(logEl.firstChild);
        }

        // ─── Datenquellen ─────────────────────────────────────────────

        async function fetchWithTimeout(url, ms) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), ms);
            try {
                const r = await fetch(url, { signal: controller.signal });
                clearTimeout(timer);
                return r;
            } catch (e) {
                clearTimeout(timer);
                throw e;
            }
        }

        async function loadFromServer() {
            try {
                const response = await fetchWithTimeout(CONFIG.API_ENDPOINT, CONFIG.FETCH_TIMEOUT_MS);
                if (response.ok) {
                    const data = await response.json();
                    if (data.error) return null;  // Server da, aber Daten noch nicht bereit
                    return data;
                }
            } catch (e) { /* Server offline */ }
            return null;
        }

        async function loadFromCachedJson() {
            // Quelle A: GitHub Raw URL (für InfinityFree-Hosting, immer erreichbar wenn Repo public ist)
            if (CONFIG.GITHUB_RAW_URL) {
                try {
                    const response = await fetchWithTimeout(CONFIG.GITHUB_RAW_URL, 8000);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.kommende || data.aktuelle) {
                            data.source = 'github';
                            return data;
                        }
                    }
                } catch (e) { /* GitHub nicht erreichbar */ }
            }

            // Quelle B: Lokale anime_data.json (via Flask-Server oder selber Domain)
            try {
                const response = await fetchWithTimeout(CONFIG.SERVER_URL + '/' + CONFIG.JSON_CACHE, 3000);
                if (response.ok) {
                    const data = await response.json();
                    if (data.kommende || data.aktuelle) {
                        data.source = 'cache';
                        return data;
                    }
                }
            } catch (e) { /* kein Server */ }
            return null;
        }

        // ─── Normalisierung ───────────────────────────────────────────

        function normalizeAnime(raw, index, type) {
            const isScraperFormat = raw.info !== undefined;
            return {
                ...raw,
                id: raw.id ? `${type}_${raw.id}` : `${type}_${index}`,
                type: type,
                episodes: raw.episodes || (isScraperFormat
                    ? (raw.info?.match(/(\d+)\s*Episode/)?.[1] || '?')
                    : '?'),
                year: raw.year || new Date().getFullYear(),
                status: isScraperFormat
                    ? (type === 'aktuell' ? 'Laufend' : type === 'abgeschlossen' ? 'Abgeschlossen' : 'Geplant')
                    : (raw.status || 'Geplant'),
                timeLabel: isScraperFormat
                    ? (type === 'kommend' ? 'Demnächst' : type === 'abgeschlossen' ? 'Abgeschlossen' : 'Aktuell')
                    : (type === 'kommend'
                        ? `In ${raw.dub_weeks || Math.floor(Math.random()*4)+1} Wochen`
                        : `Vor ${raw.days_ago || Math.floor(Math.random()*20)+1} Tagen`),
                image: raw.image || '',
                anisearchUrl: raw.url || '',
            };
        }

        // ─── Datenladen & Initialisierung ─────────────────────────────

        function applyDataToState(data, source) {
            const kommendeData      = data.kommende      || [];
            const aktuelleData      = data.aktuelle      || [];
            const abgeschlossenData = data.abgeschlossen || [];

            const allAnimes = [
                ...kommendeData.map((a, i)      => normalizeAnime(a, i, 'kommend')),
                ...aktuelleData.map((a, i)      => normalizeAnime(a, i, 'aktuell')),
                ...abgeschlossenData.map((a, i) => normalizeAnime(a, i, 'abgeschlossen')),
            ];

            const prevSource = state.dataSource;
            state.animes     = allAnimes;
            state.dataSource = source;
            state.lastUpdate = new Date().toLocaleString('de-DE');
            state.hasAbgeschlossen = abgeschlossenData.length > 0;

            // Zeige/Verstecke Abgeschlossen-Tab
            const tabAbs = document.getElementById('tabAbgeschlossen');
            if (tabAbs) tabAbs.style.display = state.hasAbgeschlossen ? '' : 'none';

            applyFilters();
            updateStats();
            updateApiStatus();
            updateOfflineBanner();

            if (prevSource !== source) {
                const ts = data.timestamp
                    ? new Date(data.timestamp).toLocaleString('de-DE')
                    : '';
                const msgs = {
                    live:   `🌐 Live-Daten: ${kommendeData.length} geplant · ${aktuelleData.length} aktuell · ${abgeschlossenData.length} abgeschl.`,
                    github: `🐙 GitHub Actions Daten (${ts}): ${allAnimes.length} Anime`,
                    cache:  `💾 Gecachte Daten: ${allAnimes.length} Anime (Starte Server für Live-Daten)`,
                    demo:   `✨ Demo-Modus – ${allAnimes.length} Animes`
                };
                addLog(msgs[source] || '');
                if (source === 'live' && prevSource !== 'live') {
                    showNotification('🔴 Live-Daten von anisearch.de geladen! 🎉');
                }
            }

            if (data.scraping) {
                document.getElementById('scrapingIndicator')?.classList.add('visible');
            } else {
                document.getElementById('scrapingIndicator')?.classList.remove('visible');
            }
        }

        async function initializeAnimes() {
            addLog('📡 Verbinde mit Server...');

            // Quelle 1: Live-Server
            const serverData = await loadFromServer();
            if (serverData && (serverData.kommende || serverData.aktuelle)) {
                applyDataToState(serverData, 'live');
                startPolling();
                return;
            }

            // Quelle 2: Gecachte JSON-Datei
            addLog('⚠️ Server nicht verfügbar – versuche gecachte Daten...');
            const cachedData = await loadFromCachedJson();
            if (cachedData && (cachedData.kommende || cachedData.aktuelle)) {
                const age = cachedData.timestamp
                    ? new Date(cachedData.timestamp).toLocaleString('de-DE')
                    : 'unbekannt';
                addLog(`💾 Gecachte Daten geladen (Stand: ${age})`);
                applyDataToState(cachedData, 'cache');
                startPolling();  // Im Hintergrund auf Server warten
                return;
            }

            // Quelle 3: Demo-Daten
            addLog('✨ Kein Server & kein Cache – nutze Demo-Datenbank');
            applyDataToState({
                kommende:      KOMMENDE_DUBS,
                aktuelle:      AKTUELLE_DUBS,
                abgeschlossen: []
            }, 'demo');
            startPolling();  // Auf Server warten
        }

        // ─── Auto-Polling ─────────────────────────────────────────────

        function startPolling() {
            if (state.pollTimer) return;
            state.pollTimer = setInterval(async () => {
                const prev = state.dataSource;
                const serverData = await loadFromServer();
                if (serverData && (serverData.kommende || serverData.aktuelle)) {
                    if (prev !== 'live' || serverData.scraping !== undefined) {
                        applyDataToState(serverData, 'live');
                    }
                } else if (prev === 'live') {
                    // Server weg – zurück auf Cache oder Demo
                    addLog('⚠️ Server-Verbindung verloren – Auto-Reconnect aktiv...');
                    const cached = await loadFromCachedJson();
                    if (cached) applyDataToState(cached, 'cache');
                    else applyDataToState({ kommende: KOMMENDE_DUBS, aktuelle: AKTUELLE_DUBS, abgeschlossen: [] }, 'demo');
                }
            }, CONFIG.POLL_INTERVAL_MS);
        }

        async function manualRefresh() {
            addLog('🔄 Manueller Refresh...');
            // Trigger Server-Scrape falls vorhanden
            try {
                await fetchWithTimeout(CONFIG.REFRESH_ENDPOINT, 3000);
                addLog('⚙️ Scraper gestartet – Daten kommen in Kürze...');
                document.getElementById('scrapingIndicator')?.classList.add('visible');
            } catch(e) { /* kein Server */ }
            await initializeAnimes();
        }

        function updateStats() {
            const statsGrid = document.getElementById('statsGrid');
            if (!statsGrid) return;
            const kommendeCount      = state.animes.filter(a => a.type === 'kommend').length;
            const aktuelleCount      = state.animes.filter(a => a.type === 'aktuell').length;
            const abgeschlossenCount = state.animes.filter(a => a.type === 'abgeschlossen').length;
            const abgeschlossenCard  = abgeschlossenCount > 0 ? `
                <div class="stat-card">
                    <div class="stat-value" style="background:linear-gradient(135deg,#86efac,#22c55e);-webkit-background-clip:text;">${abgeschlossenCount}</div>
                    <div class="stat-label">Abgeschlossen</div>
                </div>` : '';
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${state.animes.length}</div>
                    <div class="stat-label">Gesamt Animes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value glow-primary">${kommendeCount}</div>
                    <div class="stat-label">Bald verfügbar</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value glow-secondary">${aktuelleCount}</div>
                    <div class="stat-label">Kürzlich erschienen</div>
                </div>
                ${abgeschlossenCard}
                <div class="stat-card">
                    <div class="stat-value">${state.watchlist.length}</div>
                    <div class="stat-label">In Watchlist</div>
                </div>
            `;
        }

        function applyFilters() {
            const searchInput = document.getElementById('searchInput');
            const searchTerm  = (searchInput?.value || '').toLowerCase();
            const sortVal     = document.getElementById('sortSelect').value;

            let result = state.animes.filter(anime => {
                const title        = (anime.title || '').toLowerCase();
                const matchesSearch = !searchTerm || title.includes(searchTerm);
                let matchesTab = true;

                if (state.currentTab === 'kommende-dubs')       matchesTab = anime.type === 'kommend';
                else if (state.currentTab === 'aktuelle-dubs')  matchesTab = anime.type === 'aktuell';
                else if (state.currentTab === 'abgeschlossene-dubs') matchesTab = anime.type === 'abgeschlossen';
                else if (state.currentTab === 'watchlist')      matchesTab = state.watchlist.some(w => w.id === anime.id);

                return matchesSearch && matchesTab;
            });

            // Sorting
            result.sort((a, b) => {
                switch (sortVal) {
                    case 'title_asc': return (a.title || '').localeCompare(b.title || '', 'de');
                    case 'title_desc': return (b.title || '').localeCompare(a.title || '', 'de');
                    case 'year_desc': return (b.year || 0) - (a.year || 0);
                    case 'year_asc': return (a.year || 0) - (b.year || 0);
                    default: return 0;
                }
            });

            state.filteredAnimes = result;
            state.currentPage = 1;
            renderAnimes();
        }

        function renderAnimes() {
            const contentArea = document.getElementById('contentArea');
            if (!contentArea) return;
            
            if (state.filteredAnimes.length === 0) {
                contentArea.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px; opacity: 0.7;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom: 20px;">
                            <circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                        <h2 style="font-family: var(--font-display);">Keine Animes gefunden</h2>
                        <p>Versuche einen anderen Suchbegriff oder Tab.</p>
                    </div>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const start = (state.currentPage - 1) * state.pageSize;
            const end = start + state.pageSize;
            const paginated = state.filteredAnimes.slice(start, end);
            const totalPages = Math.ceil(state.filteredAnimes.length / state.pageSize);

            const html = paginated.map(anime => {
                const isWatchlisted = state.watchlist.some(w => w.id === anime.id);
                const isCurrent = anime.type === 'aktuell';
                
                const isAbgeschlossen = anime.type === 'abgeschlossen';
                const tagClass = isCurrent ? 'tag-aktuell' : isAbgeschlossen ? '' : 'tag-kommend';
                const tagText  = isCurrent ? '🔥 Kürzlich' : isAbgeschlossen ? '✅ Abgeschlossen' : '⏱️ Bald';
                const highLightClass = isCurrent ? 'recent' : 'soon';
                const tagStyle = isAbgeschlossen ? 'background:rgba(34,197,94,0.8);color:#fff;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);display:inline-flex;align-items:center;gap:4px;' : '';

                // Use real cover image from anisearch CDN, fallback to gradient bg
                const imgHtml = anime.image
                    ? `<img src="${anime.image}" alt="${anime.title}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;border-radius:12px 12px 0 0;" onerror="this.style.display='none'" />`
                    : getAbstractBg(anime.id);

                return `
                    <div class="anime-card" onclick="openModal('${anime.id}')">
                        <div class="anime-image">
                            ${imgHtml}
                            <div class="floating-tags">
                                ${isAbgeschlossen
                                    ? `<span style="${tagStyle}">${tagText}</span>`
                                    : `<span class="tag-status ${tagClass}">${tagText}</span>`
                                }
                                <span class="episodes-badge">${anime.episodes} EP</span>
                            </div>
                        </div>
                        <div class="anime-content">
                            <div class="anime-title">${anime.title}</div>
                            <div class="anime-meta">
                                <span>📅 ${anime.year}</span> • <span>${anime.type === 'aktuell' ? anime.info || 'Laufend' : anime.info || 'Geplant'}</span>
                            </div>
                            
                            <div class="time-highlight ${isAbgeschlossen ? 'recent' : highLightClass}">
                                ${isCurrent ? '🟢 Synchronisation verfügbar' : isAbgeschlossen ? '✅ Deutsche Synchro abgeschlossen' : '⏳ Bald verfügbar'}
                            </div>

                            <div class="anime-actions">
                                <button onclick="event.stopPropagation(); toggleWatchlist('${anime.id}', '${anime.title}');" class="${isWatchlisted ? 'active' : ''}">
                                    ${isWatchlisted ? '✓ In Watchlist' : '+ Watchlist'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            contentArea.innerHTML = `<div class="anime-grid">${html}</div>`;

            // Pagination
            let paginationHtml = '';
            // limit visible pages for huge lists
            const maxPages = Math.min(totalPages, 7); 
            for (let i = 1; i <= maxPages; i++) {
                paginationHtml += `<button onclick="goToPage(${i})" class="${i === state.currentPage ? 'active' : ''}">${i}</button>`;
            }
            if (totalPages > maxPages) paginationHtml += `<button disabled>...</button><button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            
            document.getElementById('pagination').innerHTML = totalPages > 1 ? paginationHtml : '';
        }

        // Just a helper to generate unique looking abstract backgrounds for images since we don't have URLs
        function getAbstractBg(id) {
            const num = Array.from(id).reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const hue = num % 360;
            const hue2 = (hue + 60) % 360;
            return `<div style="position: absolute; inset:0; background: linear-gradient(135deg, hsl(${hue}, 70%, 20%), hsl(${hue2}, 60%, 15%)); z-index:1;"></div>`;
        }

        function toggleWatchlist(id, title) {
            const idx = state.watchlist.findIndex(w => w.id === id);
            if (idx > -1) {
                state.watchlist.splice(idx, 1);
                showNotification(`Entfernt: ${title}`);
            } else {
                state.watchlist.push({ id, title });
                showNotification(`Gemerkt: ${title}`);
            }
            localStorage.setItem('premiumWatchlist', JSON.stringify(state.watchlist));
            if (state.currentTab === 'watchlist') applyFilters(); // refresh if inside watchlist tab
            updateStats();
            
            const btn = event.currentTarget;
            if (idx > -1) {
                btn.classList.remove('active');
                btn.innerHTML = '+ Watchlist';
            } else {
                btn.classList.add('active');
                btn.innerHTML = '✓ In Watchlist';
            }
        }

        function openModal(id) {
            const anime = state.animes.find(a => a.id === id);
            if (!anime) return;
            
            const isWatchlisted = state.watchlist.some(w => w.id === id);
            const isCurrent = anime.type === 'aktuell';
            const hlClass = isCurrent ? 'time-highlight recent' : 'time-highlight soon';
            
            const modalBody = document.getElementById('modalBody');
            const coverImg = anime.image
                ? `<img src="${anime.image}" alt="${anime.title}" style="width:100%;max-height:220px;object-fit:cover;border-radius:12px;margin-bottom:20px;" onerror="this.style.display='none'" />`
                : '';
            const anisearchLink = anime.anisearchUrl
                ? `<a href="${anime.anisearchUrl}" target="_blank" rel="noopener" class="btn btn-glass" style="text-decoration:none;">🔗 Auf AniSearch</a>`
                : '';
            modalBody.innerHTML = `
                ${coverImg}
                <h2 style="font-family: var(--font-display); font-size: 24px; margin-bottom: 8px;">${anime.title}</h2>
                <div style="color: var(--text-muted); margin-bottom: 24px;">Release: ${anime.year} | ${anime.info || anime.status}</div>
                
                <div class="${hlClass}" style="margin-bottom: 30px; padding: 16px; font-size: 15px;">
                    <strong>${isCurrent ? '🟢 Deutsche Synchronisation verfügbar' : '⏳ Deutsche Synchronisation geplant'}</strong>
                    <br/><small style="opacity:0.8;">Quelle: anisearch.de (Automatisch aktualisiert)</small>
                </div>
                
                <p style="color: var(--text-muted); line-height: 1.6; margin-bottom: 30px;">
                    Synchronisations-Daten werden automatisch von anisearch.de abgerufen und regelmäßig aktualisiert.
                </p>

                <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                    <button class="btn btn-primary" style="flex: 1; justify-content: center;" onclick="toggleWatchlist('${id}', '${anime.title}'); closeModal();">
                        ${isWatchlisted ? 'Aus Watchlist entfernen' : 'Zur Watchlist hinzufügen'}
                    </button>
                    ${anisearchLink}
                    <button class="btn btn-glass" onclick="closeModal()">Schließen</button>
                </div>
            `;
            document.getElementById('detailsModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.remove('active');
        }

        function goToPage(page) {
            state.currentPage = page;
            renderAnimes();
            window.scrollTo({ top: document.querySelector('.dashboard-panel').offsetTop - 100, behavior: 'smooth' });
        }

        function updateApiStatus() {
            const statusEl = document.getElementById('apiStatus');
            if (!statusEl) return;
            const configs = {
                live:   { cls: 'online',  dot: '#34d399', label: 'Live · anisearch.de' },
                github: { cls: 'cached',  dot: '#60a5fa', label: '🐙 GitHub Actions' },
                cache:  { cls: 'cached',  dot: '#fbbf24', label: 'Gecachte Daten' },
                demo:   { cls: 'offline', dot: '#f87171', label: 'Demo-Modus' },
                none:   { cls: 'loading', dot: '#93c5fd', label: 'Verbinde...' },
            };
            const cfg = configs[state.dataSource] || configs.none;
            statusEl.className = 'api-status ' + cfg.cls;
            statusEl.innerHTML = `<span style="display:inline-block;width:8px;height:8px;background:${cfg.dot};border-radius:50%"></span> ${cfg.label}`;
        }

        function updateOfflineBanner() {
            const banner = document.getElementById('offlineBanner');
            if (!banner) return;
            if (state.dataSource === 'demo') {
                banner.classList.add('visible');
            } else {
                banner.classList.remove('visible');
            }
        }

        function showNotification(message) {
            const container = document.getElementById('notification');
            if (!container) return;
            const notif = document.createElement('div');
            notif.className = `notification`;
            notif.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                ${message}
            `;
            container.appendChild(notif);
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transform = 'translateY(20px)';
                setTimeout(() => notif.remove(), 300);
            }, 4000);
        }

        function updateTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === state.currentTab) {
                    btn.classList.add('active');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('premiumWatchlist');
            state.watchlist = saved ? JSON.parse(saved) : [];

            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('sortSelect').addEventListener('change', applyFilters);
            document.getElementById('pageSizeSelect').addEventListener('change', (e) => {
                state.pageSize = parseInt(e.target.value) || 24;
                localStorage.setItem('premiumPageSize', state.pageSize);
                applyFilters();
            });

            document.getElementById('refreshBtn').addEventListener('click', () => {
                addLog('🔄 Manueller Resync...');
                manualRefresh();
            });
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            
            document.getElementById('watchlistBtn').addEventListener('click', () => {
                state.currentTab = 'watchlist';
                updateTabs();
                applyFilters();
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.currentTab = btn.dataset.tab || 'alle';
                    updateTabs();
                    applyFilters();
                });
            });

            initializeAnimes();
            setTimeout(() => { showNotification('Datenbank geladen & bereit 🚀'); }, 800);
        });
    </script>
